name: Auto-Expire

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and replace
        run: |
          CURRENT=$(date +%s)
          EXPIRE=1719594900  # 28.06.2026 17:15

          if [ $CURRENT -gt $EXPIRE ]; then
            cat > sub.txt << 'EOF'
#profile-title: SecureVPN | Продлить: @SecureDaVpnBot
#profile-update-interval: 12

vless://00000000-0000-0000-0000-000000000000@0.0.0.0:0?type=tcp&encryption=none&security=reality&fp=firefox&sni=example.com&sid=0000&spx=%2F&flow=xtls-rprx-vision#⛔️ Подписка истекла 28.06.2026 17:15
vless://00000000-0000-0000-0000-000000000000@0.0.0.0:0?type=tcp&encryption=none&security=reality&fp=firefox&sni=example.com&sid=0000&spx=%2F&flow=xtls-rprx-vision#🔄 Продлить: @SecureDaVpnBot
EOF
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add sub.txt
            git commit -m "Подписка истекла 17:15"
            git push
          fi
